<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Research Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .search-box {
            width: 100%;
            max-width: 750px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 10px;
            border: 1px solid #2a2a3a;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .search-box input:focus {
            border-color: #6c63ff;
        }

        .search-box button {
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            background: #6c63ff;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-box button:hover { background: #574fd6; }
        .search-box button:disabled { background: #444; cursor: not-allowed; }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .controls button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: #1a1a2e;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .controls button:hover { border-color: #6c63ff; color: #fff; }

        .panel {
            width: 100%;
            max-width: 750px;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6c63ff;
            margin-bottom: 14px;
        }

        /* Activity feed */
        #activity {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 40px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 8px;
            background: #0f1117;
            animation: fadeIn 0.3s ease;
        }
        
        .error-banner {
            width: 100%;
            max-width: 750px;
            background: #2a1a1a;
            border: 1px solid #f44336;
            border-radius: 10px;
            padding: 14px 18px;
            color: #f44336;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
            margin-bottom: 16px;
        }

        .error-banner span {
            margin-left: 8px;
        }

        .retry-btn {
            margin-left: 12px;
            background: none;
            border: 1px solid #f44336;
            color: #f44336;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .retry-btn:hover {
            background: #f44336;
            color: #fff;
        }

        .empty-state {
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            padding: 20px 0;
        }

        .activity-item.status { color: #aaa; }
        .activity-item.tool_start { color: #6c63ff; }
        .activity-item.tool_end { color: #4caf50; }
        .activity-item.error { color: #f44336; }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status .dot { background: #aaa; }
        .tool_start .dot { background: #6c63ff; animation: pulse 1s infinite; }
        .tool_end .dot { background: #4caf50; }
        .error .dot { background: #f44336; }

        /* Report */
        #report {
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 0.95rem;
            color: #e0e0e0;
            display: none;
        }

        #report h1, #report h2, #report h3 {
            color: #fff;
            margin: 16px 0 8px;
        }

        #report ul, #report ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        #report li { margin: 4px 0; }

        #report a { color: #6c63ff; }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;    
        }

        .copy-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: #0f1117;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: #6c63ff;
            color: #fff;
        }

        .copy-btn.copied {
            border-color: #4caf50;
            color: #4caf50;
        }
        .memory-badge {
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #444;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>🔬 Research Agent</h1>
    <p class="subtitle">Autonomous AI research powered by LangGraph + Groq</p>

    <div class="search-box">
        <input type="text" id="queryInput" placeholder="Ask a research question..." />
        <button id="searchBtn" onclick="startResearch()">Research</button>
    </div>

    <div class="controls">
        <button onclick="clearMemory()">🗑 Clear Memory</button>
        <button onclick="showMemory()">💾 Memory Status</button>
    </div>
        <!-- Error Banner -->
    <div class="error-banner" id="errorBanner">
        ⚠️ <span id="errorMessage"></span>
        <button class="retry-btn" onclick="retry()">Retry</button>
    </div>
    <!-- Activity Feed -->
    <div class="panel" id="activityPanel" style="display:none">
        <h3>⚡ Agent Activity</h3>
        <div id="activity"></div>
    </div>

    <!-- Report -->
    <div class="panel" id="reportPanel" style="display:none">
        <div class="report-header">
            <h3>📄 Research Report</h3>
            <button class="copy-btn" id="copyBtn" onclick="copyReport()">
                📋 Copy
            </button>
        </div>
        <div id="report"></div>
    </div>

    <p class="memory-badge" id="memoryBadge"></p>

    <script>
        function generateUUID() {
            try {
                // Works on HTTPS / localhost
                return crypto.randomUUID();
            } catch {
                // Fallback for HTTP (manual UUID generation)
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            }
        }
        
        const SESSION_ID = (() => {
            const existing = sessionStorage.getItem("session_id");
            if (existing) return existing;
            const id = generateUUID();  // ✅ uses fallback if needed
            sessionStorage.setItem("session_id", id);
            return id;
        })();

        let eventSource = null;
        let lastQuery = "";  // ✅ store for retry

        async function startResearch() {
            const query = document.getElementById("queryInput").value.trim();
            
            // ✅ Validate query before sending
            if (!query) {
                showError("Please enter a research question.");
                return;
            }
            if (query.length < 5) {
                showError("Query is too short — please be more specific.");
                return;
            }

            lastQuery = query;
            hideError();
            resetUI();

            document.getElementById("searchBtn").disabled = true;
            document.getElementById("searchBtn").innerHTML = '<span class="spinner"></span>';
            document.getElementById("activityPanel").style.display = "block";

            if (eventSource) eventSource.close();

            try {
                const res = await fetch("/research", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ query, session_id: SESSION_ID })
                });

                // ✅ Handle HTTP errors from server
                if (!res.ok) {
                    const data = await res.json();
                    showError(data.error || `Server error (${res.status})`);
                    resetButton();
                    return;
                }

            } catch (err) {
                // ✅ Handle network errors (server down etc.)
                showError("Cannot connect to server. Is the backend running?");
                resetButton();
                return;
            }

            // Open SSE stream
            eventSource = new EventSource(`/stream/${SESSION_ID}`);

            // ✅ Timeout — show message if no response in 90s
            const timeout = setTimeout(() => {
                if (eventSource) {
                    eventSource.close();
                    addActivity("error", "⏱ Research is taking too long — please try again.");
                    showError("Request timed out. Try a simpler question.");
                    resetButton();
                }
            }, 90000);

            eventSource.onmessage = (e) => {
                try {
                    const event = JSON.parse(e.data);
                    handleEvent(event, timeout);
                } catch (err) {
                    showError("Received malformed response from server.");
                    resetButton();
                    clearTimeout(timeout);
                    eventSource.close();
                }
            };

            eventSource.onerror = () => {
                clearTimeout(timeout);
                // ✅ Only show error if we haven't completed successfully
                if (document.getElementById("searchBtn").disabled) {
                    showError("Connection lost. Please try again.");
                    addActivity("error", "❌ Connection error");
                    resetButton();
                }
                eventSource.close();
            };
        }

        function handleEvent(event, timeout) {
            if (event.type === "status") {
                addActivity("status", event.message);
            }
            else if (event.type === "tool_start") {
                addActivity("tool_start", `🔧 ${event.tool} → "${event.input}"`);
            }
            else if (event.type === "tool_end") {
                addActivity("tool_end", "✓ Tool completed");
            }
            else if (event.type === "report") {
                showReport(event.message);
            }
            else if (event.type === "done") {
                clearTimeout(timeout);
                addActivity("status", "✅ Research complete");
                resetButton();
                updateMemoryBadge();
                eventSource.close();
            }
            else if (event.type === "error") {
                clearTimeout(timeout);
                // ✅ Show error in both activity feed and banner
                addActivity("error", `❌ ${event.message}`);
                showError(event.message);
                resetButton();
                eventSource.close();
            }
        }

        function showError(message) {
            const banner = document.getElementById("errorBanner");
            document.getElementById("errorMessage").textContent = message;
            banner.style.display = "block";
        }

        function hideError() {
            document.getElementById("errorBanner").style.display = "none";
        }

        // ✅ Retry last query with one click
        function retry() {
            if (!lastQuery) return;
            document.getElementById("queryInput").value = lastQuery;
            hideError();
            startResearch();
        }

        function resetUI() {
            document.getElementById("activity").innerHTML = "";
            document.getElementById("report").innerHTML = "";
            document.getElementById("report").style.display = "none";
            document.getElementById("reportPanel").style.display = "none";
        }

        function addActivity(type, message) {
            const feed = document.getElementById("activity");

            // ✅ Remove empty state if present
            const empty = feed.querySelector(".empty-state");
            if (empty) empty.remove();

            const item = document.createElement("div");
            item.className = `activity-item ${type}`;
            item.innerHTML = `<span class="dot"></span><span>${message}</span>`;
            feed.appendChild(item);
            feed.scrollTop = feed.scrollHeight;
        }

        function showReport(text) {
            document.getElementById("reportPanel").style.display = "block";
            const reportEl = document.getElementById("report");
            reportEl.style.display = "block";
            reportEl.innerHTML = text
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\[(.+?)\]\((https?:\/\/.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/\n/g, '<br>');
        }

        async function clearMemory() {
            await fetch("/clear", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: SESSION_ID })
            });
            resetUI();
            hideError();
            document.getElementById("activityPanel").style.display = "none";
            document.getElementById("memoryBadge").textContent = "Memory cleared";
        }

        async function showMemory() {
            try {
                const res = await fetch("/memory");
                const data = await res.json();
                document.getElementById("memoryBadge").textContent =
                    `💾 ${data.chunks} chunks stored in vector memory`;
            } catch {
                document.getElementById("memoryBadge").textContent = "Could not fetch memory status";
            }
        }

        async function updateMemoryBadge() {
            try {
                const res = await fetch("/memory");
                const data = await res.json();
                document.getElementById("memoryBadge").textContent =
                    `💾 ${data.chunks} chunks stored in vector memory`;
            } catch {
                // silent fail
            }
        }
        function copyReport() {
            const reportEl = document.getElementById("report");
            const text = reportEl.innerText;  // plain text, no HTML tags
            
            navigator.clipboard.writeText(text)
                .then(() => {
                    const btn = document.getElementById("copyBtn");
                    btn.textContent = "✅ Copied!";
                    btn.classList.add("copied");
                    setTimeout(() => {
                        btn.textContent = "📋 Copy";
                        btn.classList.remove("copied");
                    }, 2000);
                })
                .catch(() => {
                    // Fallback for older browsers
                    const textarea = document.createElement("textarea");
                    textarea.value = text;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand("copy");
                    document.body.removeChild(textarea);
                });
        }       
        document.getElementById("queryInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") startResearch();
        });

        function resetButton() {
            const btn = document.getElementById("searchBtn");
            btn.disabled = false;
            btn.innerHTML = "Research";
        }
    </script>
</body>
</html>
